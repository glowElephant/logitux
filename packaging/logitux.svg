<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- logitux 앱 아이콘: 마우스 실루엣 + 단축키 매핑 강조 -->
  <rect width="128" height="128" rx="26" fill="#23242c"/>
  <!-- 마우스 본체 -->
  <rect x="40" y="26" width="48" height="76" rx="24" fill="#2e3340" stroke="#5b8cff" stroke-width="3.5"/>
  <!-- 좌/우 버튼 분할선 -->
  <line x1="64" y1="28" x2="64" y2="54" stroke="#5b8cff" stroke-width="2.5"/>
  <path d="M40 54 H88" stroke="#5b8cff" stroke-width="2.5" opacity="0.5"/>
  <!-- 스크롤 휠 -->
  <rect x="60" y="36" width="8" height="16" rx="4" fill="#5b8cff"/>
  <!-- 매핑 강조: 측면 버튼 + 단축키 점 -->
  <circle cx="64" cy="74" r="7" fill="#3ddc84"/>
  <text x="64" y="78.5" font-family="sans-serif" font-size="9" font-weight="700"
        text-anchor="middle" fill="#23242c">K</text>
</svg>
